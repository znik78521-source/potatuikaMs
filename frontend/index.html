<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a0b2e">
    <title>Potatuika Messenger 💜💚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0b2e, #2a1a3e);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        body.theme-purple-green { --primary: #b77bff; --secondary: #00ffaa; --bg-dark: #1a0b2e; --bg-light: #2a1a3e; --bg-card: rgba(26,11,46,0.95); --text: #fff; --text-secondary: rgba(255,255,255,0.7); --hover: rgba(183,123,255,0.2); --border: rgba(183,123,255,0.2); }
        body.theme-dark { --primary: #6c5ce7; --secondary: #a8e6cf; --bg-dark: #1e1e1e; --bg-light: #2d2d2d; --bg-card: rgba(30,30,30,0.95); --text: #fff; --text-secondary: rgba(255,255,255,0.7); --hover: rgba(108,92,231,0.2); --border: rgba(108,92,231,0.2); }
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        .auth-container {
            max-width: 400px; margin: 15vh auto; background: var(--bg-card); border-radius: 28px;
            padding: 32px 24px; backdrop-filter: blur(20px); border: 1px solid var(--border);
        }
        @media (max-width: 480px) { .auth-container { margin: 10vh 16px; padding: 24px 20px; } }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 56px; animation: pulse 2s infinite; }
        .logo h1 { font-size: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .auth-tabs { display: flex; gap: 12px; margin-bottom: 24px; }
        .tab-btn {
            flex: 1; padding: 12px; background: rgba(183,123,255,0.1); border: none;
            color: var(--text); cursor: pointer; border-radius: 60px; font-size: 16px; font-weight: 500;
            transition: all 0.2s ease;
        }
        .tab-btn:active { transform: scale(0.97); }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #1a0b2e; font-weight: bold; }

        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form input {
            width: 100%; padding: 16px; margin-bottom: 16px;
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 60px; color: var(--text); font-size: 16px;
        }
        .auth-form input:focus { outline: none; border-color: var(--secondary); }
        .auth-form button {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 60px; font-weight: 600; cursor: pointer;
        }

        .loading-container {
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            height: 100vh; background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
        }
        .loading-animation {
            width: 200px; height: 200px; object-fit: contain;
            animation: fadeIn 0.3s ease;
        }
        .loading-text {
            margin-top: 20px; font-size: 14px; color: var(--text-secondary);
        }

        .app-container { display: flex; height: 100vh; position: relative; }
        .sidebar {
            width: 320px; background: var(--bg-card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; backdrop-filter: blur(20px); z-index: 10;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -320px; top: 0; height: 100%; transition: left 0.3s ease; z-index: 100; }
            .sidebar.open { left: 0; }
            .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
            .sidebar-overlay.open { display: block; }
        }

        .user-info { padding: 20px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar {
            width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .user-details h3 { font-size: 16px; }
        .user-details p { font-size: 13px; color: var(--secondary); }

        .search-box { padding: 12px 16px; }
        .search-box input {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.08);
            border: 1px solid var(--border); border-radius: 60px; color: var(--text); font-size: 15px;
        }

        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 14px 16px; cursor: pointer; transition: background 0.2s ease;
            border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
        }
        .chat-item.active { background: linear-gradient(90deg, var(--hover), transparent); border-left: 3px solid var(--secondary); }
        .chat-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; font-size: 15px; }
        .chat-preview { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        .chat-header {
            padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .menu-btn { display: none; background: none; border: none; font-size: 24px; color: var(--text); cursor: pointer; }
        @media (max-width: 768px) { .menu-btn { display: block; } }
        .chat-header-info { flex: 1; }
        .chat-header h2 { font-size: 17px; font-weight: 600; }
        .chat-status-text { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .chat-actions { display: flex; gap: 8px; }
        .chat-actions button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; color: var(--text); }
        .chat-actions button:active { background: var(--hover); }

        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message {
            max-width: 75%; padding: 10px 14px; border-radius: 20px; animation: fadeIn 0.2s ease;
        }
        @media (max-width: 480px) { .message { max-width: 85%; } }
        .message.own { align-self: flex-end; background: linear-gradient(135deg, var(--secondary), #00cc88); color: var(--bg-dark); border-bottom-right-radius: 4px; }
        .message.other { align-self: flex-start; background: var(--hover); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .message-text { font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .message-image, .message-video { max-width: 100%; max-height: 250px; border-radius: 16px; margin-top: 8px; cursor: pointer; }
        .message-audio { width: 100%; margin-top: 8px; }

        .message-input-area {
            padding: 12px 16px; background: var(--bg-card); display: flex; gap: 10px; align-items: center;
            border-top: 1px solid var(--border);
        }
        .message-input-area input {
            flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.08);
            border: 1px solid var(--border); border-radius: 60px; color: var(--text); font-size: 16px;
        }
        .message-input-area button {
            width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; font-size: 20px; cursor: pointer;
        }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-card); border-radius: 28px; padding: 24px;
            max-width: 90%; width: 400px; max-height: 80vh; overflow-y: auto;
        }
        .modal-content h3 { color: var(--primary); margin-bottom: 20px; }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%; padding: 14px; margin-bottom: 16px;
            background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 16px; color: var(--text);
        }
        .modal-content button {
            padding: 12px 20px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 60px; cursor: pointer; margin-right: 10px;
        }

        .media-viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center; z-index: 1100;
        }
        .media-viewer.active { display: flex; }
        .media-viewer img, .media-viewer video { max-width: 90%; max-height: 90%; border-radius: 20px; }
        .close-media {
            position: absolute; top: 20px; right: 20px; font-size: 40px; cursor: pointer;
            background: rgba(0,0,0,0.5); width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .loading { display: inline-block; width: 50px; height: 50px; border: 3px solid var(--primary); border-top-color: var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="theme-purple-green">
    <div id="login-page" class="page active"></div>
    <div id="app-page" class="page">
        <div class="app-container">
            <div class="sidebar-overlay" id="sidebar-overlay"></div>
            <div class="sidebar" id="sidebar">
                <div class="user-info" id="user-info">
                    <div class="avatar" id="user-avatar">👤</div>
                    <div class="user-details">
                        <h3 id="user-displayname"></h3>
                        <p id="user-username"></p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Поиск...">
                </div>
                <div class="chats-list" id="chats-list"></div>
            </div>
            <div class="chat-area" id="chat-area" style="display: none;">
                <div class="chat-header">
                    <button class="menu-btn" id="menu-btn">☰</button>
                    <div class="chat-header-info">
                        <h2 id="chat-title"></h2>
                        <div class="chat-status-text" id="chat-status-text"></div>
                    </div>
                    <div class="chat-actions">
                        <button id="settings-btn">⚙️</button>
                        <button id="create-group-btn">👥</button>
                        <button id="create-channel-btn">📢</button>
                    </div>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <button id="file-btn">📎</button>
                    <input type="text" id="message-input" placeholder="Сообщение...">
                    <button id="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal"><div class="modal-content"><h3>✏️ Профиль</h3><input type="text" id="profile-displayname" placeholder="Имя"><textarea id="profile-bio" rows="3" placeholder="О себе"></textarea><button id="upload-avatar-btn">📸 Аватар</button><input type="file" id="avatar-input" accept="image/*" style="display:none;"><br><br><button id="save-profile">💾 Сохранить</button><button onclick="closeModal('profile-modal')">❌</button></div></div>
    <div id="settings-modal" class="modal"><div class="modal-content"><h3>⚙️ Настройки</h3><select id="theme-select"><option value="purple-green">💜 Фиолетово-зеленая</option><option value="dark">🌙 Темная</option></select><br><br><button onclick="saveSettings()">💾 Сохранить</button><button onclick="closeModal('settings-modal')">❌</button></div></div>
    <div id="group-modal" class="modal"><div class="modal-content"><h3>👥 Создать группу</h3><input type="text" id="group-name" placeholder="Название"><textarea id="group-desc" placeholder="Описание"></textarea><button id="create-group-submit">✨ Создать</button><button onclick="closeModal('group-modal')">❌</button></div></div>
    <div id="channel-modal" class="modal"><div class="modal-content"><h3>📢 Создать канал</h3><input type="text" id="channel-name" placeholder="Название"><textarea id="channel-desc" placeholder="Описание"></textarea><button id="create-channel-submit">✨ Создать</button><button onclick="closeModal('channel-modal')">❌</button></div></div>
    <div id="media-viewer" class="media-viewer"><span class="close-media" onclick="closeMedia()">×</span><img id="media-img" style="display:none;"><video id="media-video" controls style="display:none;"></video></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null, currentUser = null, currentChat = null, token = localStorage.getItem('potatuika_token');
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeMedia() { const v=document.getElementById('media-viewer'); v.classList.remove('active'); document.getElementById('media-img').style.display='none'; document.getElementById('media-video').style.display='none'; document.getElementById('media-video').pause(); }
        function viewMedia(url,type) { const v=document.getElementById('media-viewer'),img=document.getElementById('media-img'),vid=document.getElementById('media-video'); img.style.display='none'; vid.style.display='none'; if(type==='image'){img.src=url;img.style.display='block';}else if(type==='video'){vid.src=url;vid.style.display='block';vid.play();} v.classList.add('active'); }
        function saveSettings() { const t=document.getElementById('theme-select').value; document.body.className=`theme-${t}`; if(currentUser) fetch('/api/update-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,theme:t})}); closeModal('settings-modal'); }
        function cleanUsername(n){if(!n)return '';while(n.startsWith('@'))n=n.slice(1);return n;}
        function escapeHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        function formatStatus(o,l){if(o)return '<span style="color:#00ffaa;">🟢 в сети</span>';else if(l){const m=Math.floor((Date.now()-l)/60000),h=Math.floor(m/60),d=Math.floor(h/24);if(m<1)return '<span style="color:#888;">🟤 только что</span>';if(m<60)return `<span style="color:#888;">🟤 ${m} мин назад</span>`;if(h<24)return `<span style="color:#888;">🟤 ${h} ч назад</span>`;return `<span style="color:#888;">🟤 ${d} д назад</span>`;}return '<span style="color:#888;">⚫ не в сети</span>';}

        function showLoginForm() {
            document.getElementById('login-page').innerHTML=`<div class="auth-container"><div class="logo"><div class="logo-icon">💜💚</div><h1>Potatuika</h1></div><div class="auth-tabs"><button class="tab-btn active" data-tab="login">Вход</button><button class="tab-btn" data-tab="register">Регистрация</button></div><div id="login-form" class="auth-form active"><input type="text" id="login-username" placeholder="username"><input type="password" id="login-password" placeholder="Пароль"><button id="login-btn">Войти</button></div><div id="register-form" class="auth-form"><input type="text" id="reg-username" placeholder="username"><input type="text" id="reg-displayname" placeholder="Имя"><input type="password" id="reg-password" placeholder="Пароль"><button id="register-btn">Создать</button></div></div>`;
            document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{const t=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));document.getElementById(`${t}-form`).classList.add('active');}));
            document.getElementById('register-btn')?.addEventListener('click',async()=>{let u=document.getElementById('reg-username').value,d=document.getElementById('reg-displayname').value,p=document.getElementById('reg-password').value;u=cleanUsername(u);const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,displayName:d})});if(r.ok){const d=await r.json();currentUser=d.user;token=d.token;localStorage.setItem('potatuika_token',token);connectSocket();}else alert('Ошибка');});
            document.getElementById('login-btn')?.addEventListener('click',async()=>{let u=document.getElementById('login-username').value,p=document.getElementById('login-password').value;u=cleanUsername(u);const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});if(r.ok){const d=await r.json();currentUser=d.user;token=d.token;localStorage.setItem('potatuika_token',token);connectSocket();}else alert('Неверный логин');});
        }
        
        function showLoading() {
            document.getElementById('login-page').innerHTML=`
                <div class="loading-container">
                    <video class="loading-animation" src="/logo.webm" autoplay loop muted playsinline></video>
                    <div class="loading-text">Загрузка Potatuika...</div>
                </div>
            `;
            document.getElementById('login-page').classList.add('active');
        }
        
        function connectSocket(){
            socket=io({auth:{token}});
            socket.on('connect',()=>console.log('✅ Подключено'));
            socket.on('init',(data)=>{
                currentUser=data.user;
                document.getElementById('user-displayname').textContent=currentUser.displayName;
                document.getElementById('user-username').textContent='@'+currentUser.username;
                if(currentUser.avatar)document.getElementById('user-avatar').innerHTML=`<img src="${currentUser.avatar}" class="avatar-img">`;
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('app-page').classList.add('active');
                renderChats(data.chats||[]);
            });
            socket.on('new_message',(msg)=>{
                if(currentChat && (msg.to===currentChat.id || msg.from===currentChat.id)) addMessageToChat(msg);
                else if(currentChat && (msg.to===currentChat.id.split('_')[0] || msg.to===currentChat.id.split('_')[1])) addMessageToChat(msg);
                refreshChatsList();
            });
            socket.on('chat_history',(data)=>{const c=document.getElementById('messages-container');c.innerHTML='';data.messages.forEach(m=>addMessageToChat(m));c.scrollTop=c.scrollHeight;});
            socket.on('user_status_change',(d)=>{if(currentChat?.type==='dm' && currentChat.id.includes(d.username))document.getElementById('chat-status-text').innerHTML=formatStatus(d.online,d.lastSeen);refreshChatsList();});
            socket.on('user_status',(d)=>{if(currentChat?.type==='dm' && currentChat.id.includes(d.username))document.getElementById('chat-status-text').innerHTML=formatStatus(d.online,d.lastSeen);});
        }
        
        function renderChats(chats){
            const c=document.getElementById('chats-list');c.innerHTML='';
            if(!chats.length){c.innerHTML='<div style="padding:20px;text-align:center;color:gray;">📭 Нет чатов</div>';return;}
            chats.forEach(chat=>{
                const div=document.createElement('div');div.className='chat-item';if(currentChat && currentChat.id===chat.id)div.classList.add('active');
                let name='',icon='👤',preview=chat.lastMessage?(chat.lastMessage.text||'Файл'):'Новый чат';
                if(chat.type==='dm'){name='@'+chat.with;icon='👤';}
                else if(chat.type==='group'){name=chat.name;icon='👥';}
                else if(chat.type==='channel'){name=chat.name;icon='📢';}
                div.onclick=()=>{
                    currentChat={id:chat.id,type:chat.type,name:name};
                    document.getElementById('chat-title').textContent=name;
                    document.getElementById('chat-area').style.display='flex';
                    if(chat.type==='dm'){socket.emit('get_user_status',{username:chat.with});document.getElementById('chat-status-text').innerHTML='загрузка...';}
                    socket.emit('load_chat',{chatId:chat.id});
                    document.querySelectorAll('.chat-item').forEach(i=>i.classList.remove('active'));div.classList.add('active');
                    if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}
                };
                div.innerHTML=`<div class="chat-avatar">${icon}</div><div class="chat-info"><div class="chat-name">${escapeHtml(name)}</div><div class="chat-preview">${escapeHtml(preview.substring(0,50))}</div></div>`;
                c.appendChild(div);
            });
        }
        function refreshChatsList(){socket.emit('get_chats');}
        
        function addMessageToChat(msg){
            const c=document.getElementById('messages-container');
            const isOwn=msg.from===currentUser.username;
            const div=document.createElement('div');
            div.className=`message ${isOwn?'own':'other'}`;
            let content='';
            if(!isOwn)content+=`<div class="message-sender">${escapeHtml(msg.from)}</div>`;
            content+=`<div class="message-text">${escapeHtml(msg.text)}</div>`;
            if(msg.attachments?.length){
                msg.attachments.forEach(att=>{
                    if(att.type==='image')content+=`<img src="${att.url}" class="message-image" onclick="viewMedia('${att.url}','image')">`;
                    else if(att.type==='video' || att.url.match(/\.(mp4|webm|ogg)$/i))content+=`<video src="${att.url}" controls class="message-video"></video>`;
                    else if(att.type==='audio' || att.url.match(/\.(mp3|wav|ogg)$/i))content+=`<audio src="${att.url}" controls class="message-audio"></audio>`;
                    else content+=`<a href="${att.url}" target="_blank">📎 ${escapeHtml(att.name)}</a>`;
                });
            }
            content+=`<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
            div.innerHTML=content;
            c.appendChild(div);
            c.scrollTop=c.scrollHeight;
        }
        
        document.getElementById('send-btn')?.addEventListener('click',()=>{const i=document.getElementById('message-input');const t=i.value.trim();if(t && currentChat){socket.emit('send_message',{to:currentChat.id,type:currentChat.type,text:t,attachments:[]});i.value='';}});
        document.getElementById('message-input')?.addEventListener('keypress',(e)=>{if(e.key==='Enter')document.getElementById('send-btn').click();});
        document.getElementById('file-btn')?.addEventListener('click',()=>{const i=document.createElement('input');i.type='file';i.accept='image/*,video/*,audio/mpeg';i.onchange=async(e)=>{const f=e.target.files[0];const fd=new FormData();fd.append('file',f);const r=await fetch('/api/upload',{method:'POST',body:fd});const d=await r.json();socket.emit('send_message',{to:currentChat.id,type:currentChat.type,text:`📎 ${d.name}`,attachments:[d]});};i.click();});
        document.getElementById('user-info')?.addEventListener('click',()=>{document.getElementById('profile-displayname').value=currentUser.displayName||'';document.getElementById('profile-bio').value=currentUser.bio||'';openModal('profile-modal');});
        document.getElementById('save-profile')?.addEventListener('click',async()=>{const dn=document.getElementById('profile-displayname').value;const bio=document.getElementById('profile-bio').value;const r=await fetch('/api/update-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,displayName:dn,bio})});const d=await r.json();if(d.success){currentUser=d.user;document.getElementById('user-displayname').textContent=currentUser.displayName;alert('✅ Профиль обновлен');closeModal('profile-modal');}});
        document.getElementById('upload-avatar-btn')?.addEventListener('click',()=>document.getElementById('avatar-input').click());
        document.getElementById('avatar-input')?.addEventListener('change',async(e)=>{const f=e.target.files[0];const fd=new FormData();fd.append('avatar',f);const r=await fetch('/api/upload',{method:'POST',body:fd});const d=await r.json();await fetch('/api/update-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,avatar:d.url})});currentUser.avatar=d.url;document.getElementById('user-avatar').innerHTML=`<img src="${d.url}" class="avatar-img">`;alert('✅ Аватар обновлен');closeModal('profile-modal');});
        document.getElementById('settings-btn')?.addEventListener('click',()=>{document.getElementById('theme-select').value=currentUser?.theme||'purple-green';openModal('settings-modal');});
        document.getElementById('create-group-btn')?.addEventListener('click',()=>openModal('group-modal'));
        document.getElementById('create-channel-btn')?.addEventListener('click',()=>openModal('channel-modal'));
        document.getElementById('create-group-submit')?.addEventListener('click',async()=>{const n=document.getElementById('group-name').value,d=document.getElementById('group-desc').value;if(!n){alert('Введите название');return;}await fetch('/api/create-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,name:n,description:d})});alert('✅ Группа создана');closeModal('group-modal');location.reload();});
        document.getElementById('create-channel-submit')?.addEventListener('click',async()=>{const n=document.getElementById('channel-name').value,d=document.getElementById('channel-desc').value;if(!n){alert('Введите название');return;}await fetch('/api/create-channel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,name:n,description:d})});alert('✅ Канал создан');closeModal('channel-modal');location.reload();});
        document.getElementById('search-input')?.addEventListener('input',async(e)=>{let q=e.target.value;q=cleanUsername(q);if(q.length>1){const r=await fetch(`/api/search?q=${q}`);const users=await r.json();const c=document.getElementById('chats-list');c.innerHTML='';if(!users.length)c.innerHTML='<div style="padding:20px;text-align:center;color:gray;">👤 Не найдены</div>';users.forEach(u=>{const div=document.createElement('div');div.className='chat-item';div.onclick=()=>{const cid=[currentUser.username,u.username].sort().join('_');currentChat={id:cid,type:'dm',name:'@'+u.username};document.getElementById('chat-title').textContent='@'+u.username;document.getElementById('chat-area').style.display='flex';socket.emit('load_chat',{chatId:cid});socket.emit('get_user_status',{username:u.username});if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}};div.innerHTML=`<div class="chat-avatar">👤</div><div class="chat-info"><div class="chat-name">${escapeHtml(u.displayName)}</div><div class="chat-preview">@${u.username}</div></div>`;c.appendChild(div);});}else if(q.length===0)refreshChatsList();});
        document.getElementById('menu-btn')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');});
        document.getElementById('sidebar-overlay')?.addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');});
        
        if(token){showLoading();fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})}).then(res=>res.json()).then(data=>{if(data.user){currentUser=data.user;token=data.token;localStorage.setItem('potatuika_token',token);connectSocket();}else showLoginForm();}).catch(()=>showLoginForm());}else showLoginForm();
    </script>
</body>
</html>
