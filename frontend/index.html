<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potatuika 2.0 💜💚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ТЕМЫ */
        body.theme-purple-green {
            --primary: #b77bff;
            --secondary: #00ffaa;
            --bg-dark: #1a0b2e;
            --bg-light: #2a1a3e;
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
        }

        body.theme-dark {
            --primary: #6c5ce7;
            --secondary: #a8e6cf;
            --bg-dark: #1e1e1e;
            --bg-light: #2d2d2d;
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* АВТОРИЗАЦИЯ */
        .page {
            display: none;
            width: 100%;
            height: 100%;
        }

        .page.active {
            display: block;
        }

        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(26, 11, 46, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon { font-size: 48px; }
        .logo h1 { color: var(--primary); font-size: 32px; }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(183,123,255,0.1);
            border: none;
            color: var(--text);
            cursor: pointer;
            border-radius: 10px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--bg-dark);
            font-weight: bold;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(183,123,255,0.3);
            border-radius: 10px;
            color: var(--text);
        }

        .auth-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 300px;
            background: rgba(26, 11, 46, 0.95);
            border-right: 1px solid rgba(183,123,255,0.2);
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
        }

        .user-details h3 { font-size: 16px; }
        .user-details p { font-size: 12px; color: var(--secondary); }

        .search-box {
            padding: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(183,123,255,0.3);
            border-radius: 10px;
            color: var(--text);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid rgba(183,123,255,0.1);
        }

        .chat-item:hover {
            background: rgba(183,123,255,0.1);
        }

        .chat-item.active {
            background: linear-gradient(90deg, rgba(183,123,255,0.2), transparent);
            border-left: 3px solid var(--secondary);
        }

        .chat-name {
            font-weight: bold;
        }

        .chat-preview {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* ЧАТ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: rgba(26, 11, 46, 0.95);
            border-bottom: 1px solid rgba(183,123,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 { color: var(--primary); }

        .chat-actions button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            margin-left: 10px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary), #00cc88);
            color: var(--bg-dark);
        }

        .message.other {
            align-self: flex-start;
            background: rgba(183,123,255,0.2);
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .message-text { font-size: 14px; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 5px; }

        .message-image, .message-video {
            max-width: 300px;
            border-radius: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

        .message-audio {
            width: 250px;
            margin-top: 5px;
        }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(183,123,255,0.3);
            border-radius: 10px;
            color: var(--text);
        }

        .modal-content button {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 10px;
        }

        /* МЕДИА ПЛЕЕР */
        .media-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .media-viewer.active {
            display: flex;
        }

        .media-viewer img, .media-viewer video {
            max-width: 90%;
            max-height: 90%;
        }

        .close-media {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
        }

        /* НАСТРОЙКИ */
        .settings-section {
            margin-bottom: 20px;
        }

        .settings-section label {
            display: block;
            margin-bottom: 10px;
        }

        .settings-section select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(183,123,255,0.3);
            border-radius: 10px;
            color: var(--text);
        }

        .message-input-area {
            padding: 20px;
            background: rgba(26, 11, 46, 0.95);
            display: flex;
            gap: 10px;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(183,123,255,0.3);
            border-radius: 25px;
            color: var(--text);
        }

        .message-input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body class="theme-purple-green">
    <!-- ЛОГИН/РЕГИСТРАЦИЯ -->
    <div id="login-page" class="page active">
        <div class="auth-container">
            <div class="logo">
                <div class="logo-icon">💜💚</div>
                <h1>Potatuika 2.0</h1>
            </div>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="@username">
                <input type="password" id="login-password" placeholder="Пароль">
                <button id="login-btn">Войти</button>
            </div>
            <div id="register-form" class="auth-form">
                <input type="text" id="reg-username" placeholder="@username">
                <input type="text" id="reg-displayname" placeholder="Отображаемое имя">
                <input type="password" id="reg-password" placeholder="Пароль">
                <button id="register-btn">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="app-page" class="page">
        <div class="app-container">
            <div class="sidebar">
                <div class="user-info" id="user-info">
                    <div class="avatar" id="user-avatar">👤</div>
                    <div class="user-details">
                        <h3 id="user-displayname"></h3>
                        <p id="user-username"></p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Поиск по @username">
                </div>
                <div class="chats-list" id="chats-list"></div>
            </div>
            <div class="chat-area" id="chat-area" style="display: none;">
                <div class="chat-header">
                    <h2 id="chat-title"></h2>
                    <div class="chat-actions">
                        <button id="settings-btn" title="Настройки">⚙️</button>
                        <button id="create-group-btn" title="Создать группу">👥</button>
                        <button id="create-channel-btn" title="Создать канал">📢</button>
                    </div>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <button id="file-btn">📎</button>
                    <input type="text" id="message-input" placeholder="Введите сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <input type="text" id="profile-displayname" placeholder="Отображаемое имя">
            <textarea id="profile-bio" rows="3" placeholder="О себе"></textarea>
            <button id="upload-avatar-btn">Загрузить аватарку</button>
            <input type="file" id="avatar-input" accept="image/*" style="display: none;">
            <br><br>
            <button id="save-profile">Сохранить</button>
            <button onclick="closeModal('profile-modal')">Отмена</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Настройки</h3>
            <div class="settings-section">
                <label>Тема</label>
                <select id="theme-select">
                    <option value="purple-green">Фиолетово-зеленая</option>
                    <option value="dark">Темная</option>
                </select>
            </div>
            <button onclick="saveSettings()">Сохранить</button>
            <button onclick="closeModal('settings-modal')">Закрыть</button>
        </div>
    </div>

    <div id="group-modal" class="modal">
        <div class="modal-content">
            <h3>Создать группу</h3>
            <input type="text" id="group-name" placeholder="Название группы">
            <textarea id="group-desc" placeholder="Описание"></textarea>
            <button id="create-group-submit">Создать</button>
            <button onclick="closeModal('group-modal')">Отмена</button>
        </div>
    </div>

    <div id="channel-modal" class="modal">
        <div class="modal-content">
            <h3>Создать канал</h3>
            <input type="text" id="channel-name" placeholder="Название канала">
            <textarea id="channel-desc" placeholder="Описание"></textarea>
            <button id="create-channel-submit">Создать</button>
            <button onclick="closeModal('channel-modal')">Отмена</button>
        </div>
    </div>

    <!-- МЕДИА ПЛЕЕР -->
    <div id="media-viewer" class="media-viewer">
        <span class="close-media" onclick="closeMedia()">×</span>
        <img id="media-img" style="display: none;">
        <video id="media-video" controls style="display: none;"></video>
        <audio id="media-audio" controls style="display: none;"></audio>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentChat = null;
        let token = localStorage.getItem('potatuika_token');

        // Функции модальных окон
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function closeMedia() {
            document.getElementById('media-viewer').classList.remove('active');
            document.getElementById('media-img').style.display = 'none';
            document.getElementById('media-video').style.display = 'none';
            document.getElementById('media-audio').style.display = 'none';
            document.getElementById('media-video').pause();
            document.getElementById('media-audio').pause();
        }

        function viewMedia(url, type) {
            const viewer = document.getElementById('media-viewer');
            const img = document.getElementById('media-img');
            const video = document.getElementById('media-video');
            const audio = document.getElementById('media-audio');
            
            img.style.display = 'none';
            video.style.display = 'none';
            audio.style.display = 'none';
            
            if (type === 'image') {
                img.src = url;
                img.style.display = 'block';
            } else if (type === 'video') {
                video.src = url;
                video.style.display = 'block';
                video.play();
            } else if (type === 'audio') {
                audio.src = url;
                audio.style.display = 'block';
                audio.play();
            }
            viewer.classList.add('active');
        }

        // Сохранение настроек
        function saveSettings() {
            const theme = document.getElementById('theme-select').value;
            document.body.className = `theme-${theme}`;
            if (currentUser) {
                fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, theme })
                });
            }
            closeModal('settings-modal');
        }

        // Автоматический вход
        if (token) {
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            }).then(res => res.json()).then(data => {
                if (data.user) {
                    currentUser = data.user;
                    token = data.token;
                    localStorage.setItem('potatuika_token', token);
                    connectSocket();
                }
            });
        }

        // Регистрация
        document.getElementById('register-btn')?.addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value;
            const displayName = document.getElementById('reg-displayname').value;
            const password = document.getElementById('reg-password').value;
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, displayName })
            });
            
            if (res.ok) {
                alert('Регистрация успешна! Теперь войдите');
                document.querySelector('[data-tab="login"]').click();
            } else {
                const err = await res.json();
                alert('Ошибка: ' + err.error);
            }
        });

        // Логин
        document.getElementById('login-btn')?.addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            if (res.ok) {
                const data = await res.json();
                currentUser = data.user;
                token = data.token;
                localStorage.setItem('potatuika_token', token);
                connectSocket();
            } else {
                alert('Неверный логин или пароль');
            }
        });

        function connectSocket() {
            socket = io({ auth: { token } });
            
            socket.on('init', (data) => {
                currentUser = data.user;
                document.getElementById('user-displayname').textContent = currentUser.displayName;
                document.getElementById('user-username').textContent = '@' + currentUser.username;
                if (currentUser.avatar) {
                    document.getElementById('user-avatar').innerHTML = `<img src="${currentUser.avatar}" class="avatar-img">`;
                }
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('app-page').classList.add('active');
                
                renderChats(data.chats);
            });
            
            socket.on('new_message', (message) => {
                if (currentChat && message.to === currentChat.id) {
                    addMessageToChat(message);
                }
                refreshChats();
            });
            
            socket.on('chat_history', (data) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                data.messages.forEach(msg => addMessageToChat(msg));
            });
        }

        function renderChats(chats) {
            const container = document.getElementById('chats-list');
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.onclick = () => {
                    currentChat = chat;
                    document.getElementById('chat-title').textContent = chat.type === 'dm' ? chat.with : chat.name;
                    document.getElementById('chat-area').style.display = 'flex';
                    socket.emit('load_chat', { chatId: chat.id });
                };
                div.innerHTML = `<div class="chat-name">${chat.type === 'dm' ? '👤' : chat.type === 'group' ? '👥' : '📢'} ${chat.name || chat.with}</div>`;
                container.appendChild(div);
            });
        }

        function addMessageToChat(message) {
            const container = document.getElementById('messages-container');
            const isOwn = message.from === currentUser.username;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (!isOwn) {
                content += `<div class="message-sender">${message.from}</div>`;
            }
            content += `<div class="message-text">${message.text}</div>`;
            
            if (message.attachments) {
                message.attachments.forEach(att => {
                    if (att.type === 'image') {
                        content += `<img src="${att.url}" class="message-image" onclick="viewMedia('${att.url}', 'image')">`;
                    } else if (att.type === 'video') {
                        content += `<video src="${att.url}" class="message-video" controls onclick="viewMedia('${att.url}', 'video')"></video>`;
                    } else if (att.type === 'audio') {
                        content += `<audio src="${att.url}" class="message-audio" controls></audio>`;
                    } else {
                        content += `<a href="${att.url}" target="_blank">📎 ${att.name}</a>`;
                    }
                });
            }
            
            content += `<div class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</div>`;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function refreshChats() {
            if (currentChat) {
                socket.emit('load_chat', { chatId: currentChat.id });
            }
        }

        // Отправка сообщений
        document.getElementById('send-btn')?.addEventListener('click', () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text && currentChat) {
                socket.emit('send_message', {
                    to: currentChat.id,
                    type: currentChat.type,
                    text,
                    attachments: []
                });
                input.value = '';
            }
        });

        document.getElementById('message-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });

        // Загрузка файлов
        document.getElementById('file-btn')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*,audio/mpeg';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                socket.emit('send_message', {
                    to: currentChat.id,
                    type: currentChat.type,
                    text: `📎 ${data.name}`,
                    attachments: [data]
                });
            };
            input.click();
        });

        // Редактор профиля
        document.getElementById('user-info')?.addEventListener('click', () => {
            document.getElementById('profile-displayname').value = currentUser.displayName || '';
            document.getElementById('profile-bio').value = currentUser.bio || '';
            openModal('profile-modal');
        });

        document.getElementById('save-profile')?.addEventListener('click', async () => {
            const displayName = document.getElementById('profile-displayname').value;
            const bio = document.getElementById('profile-bio').value;
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, displayName, bio })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                document.getElementById('user-displayname').textContent = currentUser.displayName;
                alert('Профиль обновлен!');
                closeModal('profile-modal');
            }
        });

        document.getElementById('upload-avatar-btn')?.addEventListener('click', () => {
            document.getElementById('avatar-input').click();
        });

        document.getElementById('avatar-input')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('avatar', file);
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, avatar: data.url })
            });
            currentUser.avatar = data.url;
            document.getElementById('user-avatar').innerHTML = `<img src="${data.url}" class="avatar-img">`;
            alert('Аватарка обновлена!');
        });

        // Настройки
        document.getElementById('settings-btn')?.addEventListener('click', () => {
            document.getElementById('theme-select').value = currentUser.theme || 'purple-green';
            openModal('settings-modal');
        });

        // Создание группы
        document.getElementById('create-group-btn')?.addEventListener('click', () => {
            openModal('group-modal');
        });

        document.getElementById('create-group-submit')?.addEventListener('click', async () => {
            const name = document.getElementById('group-name').value;
            const description = document.getElementById('group-desc').value;
            const res = await fetch('/api/create-group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, name, description })
            });
            const data = await res.json();
            if (data.success) {
                alert('Группа создана!');
                closeModal('group-modal');
                location.reload();
            }
        });

        // Создание канала
        document.getElementById('create-channel-btn')?.addEventListener('click', () => {
            openModal('channel-modal');
        });

        document.getElementById('create-channel-submit')?.addEventListener('click', async () => {
            const name = document.getElementById('channel-name').value;
            const description = document.getElementById('channel-desc').value;
            const res = await fetch('/api/create-channel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, name, description })
            });
            const data = await res.json();
            if (data.success) {
                alert('Канал создан!');
                closeModal('channel-modal');
                location.reload();
            }
        });

        // Поиск
        document.getElementById('search-input')?.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length > 1) {
                const res = await fetch(`/api/search?q=${query}`);
                const users = await res.json();
                const container = document.getElementById('chats-list');
                container.innerHTML = '';
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => {
                        currentChat = { id: user.username, type: 'dm', name: user.displayName };
                        document.getElementById('chat-title').textContent = user.displayName;
                        document.getElementById('chat-area').style.display = 'flex';
                        socket.emit('load_chat', { chatId: [currentUser.username, user.username].sort().join('_') });
                    };
                    div.innerHTML = `<div class="chat-name">👤 ${user.displayName}</div><div class="chat-preview">@${user.username}</div>`;
                    container.appendChild(div);
                });
            }
        });

        // Переключение табов авторизации
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(`${tab}-form`).classList.add('active');
            });
        });
    </script>
</body>
</html>
