<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potatuika Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a0b2e, #2a1a3e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .auth-card {
            background: rgba(26, 11, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px;
            max-width: 400px;
            margin: 50px auto;
            border: 1px solid #b77bff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .auth-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid #b77bff;
            border-radius: 60px;
            color: white;
            font-size: 16px;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .auth-card button:active { transform: scale(0.97); }
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: rgba(183,123,255,0.2); border-radius: 40px; cursor: pointer; }
        .tab.active { background: linear-gradient(135deg, #b77bff, #00ffaa); color: #1a0b2e; font-weight: bold; }
        .app-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .sidebar { flex: 1; min-width: 280px; background: rgba(26, 11, 46, 0.9); border-radius: 24px; padding: 20px; border: 1px solid #b77bff; }
        .chat-area { flex: 2; min-width: 300px; background: rgba(26, 11, 46, 0.9); border-radius: 24px; padding: 20px; border: 1px solid #b77bff; display: flex; flex-direction: column; height: 85vh; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .message { padding: 10px 14px; border-radius: 20px; max-width: 70%; word-wrap: break-word; }
        .message.own { background: linear-gradient(135deg, #00ffaa, #00cc88); color: #1a0b2e; align-self: flex-end; }
        .message.other { background: #2a1a3e; align-self: flex-start; }
        .message-sender { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .chat-header { border-bottom: 1px solid #b77bff; padding-bottom: 12px; margin-bottom: 16px; font-size: 18px; font-weight: bold; }
        .user-list { max-height: 300px; overflow-y: auto; margin-top: 16px; }
        .user-item { padding: 10px; margin: 5px 0; background: rgba(183,123,255,0.1); border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background: rgba(183,123,255,0.3); }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 60px; border: 1px solid #b77bff; background: rgba(255,255,255,0.1); color: white; }
        .input-group button { padding: 12px 24px; border-radius: 60px; background: linear-gradient(135deg, #b77bff, #00ffaa); border: none; font-weight: bold; cursor: pointer; }
        .status { font-size: 12px; color: #00ffaa; margin-left: 8px; }
        .online { color: #00ffaa; }
        .offline { color: #888; }
        button { cursor: pointer; }
        .search-box { margin: 16px 0; }
        .search-box input { width: 100%; padding: 10px; border-radius: 40px; border: 1px solid #b77bff; background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>
<div class="container">
<div id="authScreen">
    <div class="auth-card">
        <div class="tabs">
            <div class="tab active" data-tab="login">Вход</div>
            <div class="tab" data-tab="register">Регистрация</div>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="username (без @)">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLogin">Войти</button>
        </div>
        <div id="registerForm" style="display:none">
            <input type="text" id="regUsername" placeholder="username (без @)">
            <input type="text" id="regDisplayName" placeholder="Отображаемое имя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button id="doRegister">Создать аккаунт</button>
        </div>
    </div>
</div>

<div id="appScreen" style="display:none">
    <div class="app-layout">
        <div class="sidebar">
            <div style="margin-bottom:20px">
                <strong>👤 <span id="myDisplayName"></span></strong>
                <span id="myOnlineStatus" class="status">🟢 онлайн</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="🔍 Поиск по username...">
            </div>
            <div id="usersList" class="user-list">
                <div style="color:#888;">Введите username для поиска</div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                💬 Выберите собеседника
            </div>
            <div class="messages" id="messagesList">
                <div style="color:#888; text-align:center">Начните диалог</div>
            </div>
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                <button id="sendMessageBtn" disabled>➤ Отправить</button>
            </div>
        </div>
    </div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = null;
    let currentChatId = null;
    let currentChatWith = null;
    let token = localStorage.getItem('potatuika_token');

    // ------------------ UI elements ------------------
    const authScreen = document.getElementById('authScreen');
    const appScreen = document.getElementById('appScreen');
    const messagesDiv = document.getElementById('messagesList');
    const usersListDiv = document.getElementById('usersList');
    const chatHeader = document.getElementById('chatHeader');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMessageBtn');
    const myDisplaySpan = document.getElementById('myDisplayName');

    // ------------------ Helper functions ------------------
    function cleanUsername(name) {
        if (!name) return '';
        while (name.startsWith('@')) name = name.substring(1);
        return name;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatStatusText(online, lastSeen) {
        if (online) return '<span class="online">🟢 в сети</span>';
        if (lastSeen) {
            const seconds = Math.floor((Date.now() - lastSeen) / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (minutes < 1) return '<span class="offline">🟤 только что</span>';
            if (minutes < 60) return `<span class="offline">🟤 ${minutes} мин назад</span>`;
            if (hours < 24) return `<span class="offline">🟤 ${hours} ч назад</span>`;
            return `<span class="offline">🟤 ${days} д назад</span>`;
        }
        return '<span class="offline">⚫ не в сети</span>';
    }

    // ------------------ API ------------------
    async function apiRequest(url, body) {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return res.json();
    }

    // ------------------ Auth ------------------
    document.getElementById('doLogin').onclick = async () => {
        const username = cleanUsername(document.getElementById('loginUsername').value);
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return alert('Введите логин и пароль');
        const data = await apiRequest('/api/login', { username, password });
        if (data.token) {
            token = data.token;
            localStorage.setItem('potatuika_token', token);
            currentUser = data.user;
            connectSocket();
        } else alert('Ошибка: ' + (data.error || 'неверный логин/пароль'));
    };

    document.getElementById('doRegister').onclick = async () => {
        const username = cleanUsername(document.getElementById('regUsername').value);
        const displayName = document.getElementById('regDisplayName').value || username;
        const password = document.getElementById('regPassword').value;
        if (!username || !password) return alert('Заполните username и пароль');
        const data = await apiRequest('/api/register', { username, password, displayName });
        if (data.token) {
            token = data.token;
            localStorage.setItem('potatuika_token', token);
            currentUser = data.user;
            connectSocket();
        } else alert('Ошибка: ' + (data.error || 'пользователь существует'));
    };

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const type = tab.dataset.tab;
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
        };
    });

    // ------------------ Socket ------------------
    function connectSocket() {
        if (socket) socket.disconnect();
        socket = io({ auth: { token } });

        socket.on('connect', () => console.log('✅ Сокет подключен'));

        socket.on('init', (data) => {
            currentUser = data.user;
            myDisplaySpan.innerText = currentUser.displayName || currentUser.username;
            authScreen.style.display = 'none';
            appScreen.style.display = 'flex';
            loadSearchUsers('');
        });

        socket.on('new_message', (msg) => {
            console.log('📨 Получено сообщение:', msg);
            if (currentChatId && (msg.to === currentChatId || msg.from === currentChatId)) {
                addMessageToChat(msg);
            } else {
                // Можно подсветить чат в списке, но пока просто лог
                console.log('Сообщение от', msg.from, 'не в активный чат');
            }
        });

        socket.on('chat_history', (data) => {
            messagesDiv.innerHTML = '';
            if (data.messages && data.messages.length === 0) {
                messagesDiv.innerHTML = '<div style="color:#888; text-align:center">Нет сообщений. Напишите первым!</div>';
            } else {
                (data.messages || []).forEach(m => addMessageToChat(m));
            }
        });

        socket.on('user_status', (data) => {
            if (currentChatWith === data.username) {
                const statusElem = document.getElementById('chatStatus');
                if (statusElem) statusElem.innerHTML = formatStatusText(data.online, data.lastSeen);
            }
        });
    }

    function addMessageToChat(msg) {
        const isOwn = msg.from === currentUser.username;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        div.innerHTML = `
            <div class="message-sender">${escapeHtml(msg.from)}</div>
            <div>${escapeHtml(msg.text)}</div>
            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
        `;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        // удалить заглушку если была
        if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.includes('Нет сообщений')) {
            messagesDiv.innerHTML = '';
            messagesDiv.appendChild(div);
        }
    }

    // ------------------ Поиск пользователей ------------------
    async function loadSearchUsers(query) {
        if (!query || query.length < 1) {
            usersListDiv.innerHTML = '<div style="color:#888;">Введите минимум 1 символ для поиска</div>';
            return;
        }
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const users = await res.json();
        if (users.length === 0) {
            usersListDiv.innerHTML = '<div style="color:#888;">👤 Ничего не найдено</div>';
            return;
        }
        usersListDiv.innerHTML = '';
        users.forEach(user => {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div><strong>${escapeHtml(user.displayName)}</strong> @${user.username}</div>
                <div style="font-size:12px;">${formatStatusText(user.online, user.lastSeen)}</div>
            `;
            div.onclick = () => openChatWith(user.username, user.displayName);
            usersListDiv.appendChild(div);
        });
    }

    function openChatWith(username, displayName) {
        currentChatWith = username;
        currentChatId = [currentUser.username, username].sort().join('_');
        chatHeader.innerHTML = `💬 Чат с ${escapeHtml(displayName)} <span id="chatStatus" style="font-size:12px; margin-left:8px;"></span>`;
        messageInput.disabled = false;
        sendBtn.disabled = false;
        socket.emit('load_chat', { chatId: currentChatId });
        socket.emit('get_user_status', { username });
    }

    // Отправка сообщения
    sendBtn.onclick = () => {
        const text = messageInput.value.trim();
        if (!text || !currentChatId) return;
        socket.emit('send_message', {
            to: currentChatId,
            type: 'dm',
            text: text,
            attachments: []
        });
        messageInput.value = '';
    };

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });

    // Поиск при вводе
    const searchInput = document.getElementById('searchUser');
    searchInput.addEventListener('input', (e) => loadSearchUsers(e.target.value.trim()));

    // Запуск приложения
    if (token) {
        // Проверим токен через /api/login
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        }).then(res => res.json()).then(data => {
            if (data.user) {
                currentUser = data.user;
                token = data.token;
                localStorage.setItem('potatuika_token', token);
                connectSocket();
            } else {
                authScreen.style.display = 'block';
                appScreen.style.display = 'none';
            }
        }).catch(() => {
            authScreen.style.display = 'block';
            appScreen.style.display = 'none';
        });
    } else {
        authScreen.style.display = 'block';
        appScreen.style.display = 'none';
    }
</script>
</body>
</html>
