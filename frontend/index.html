<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Potatuika Test</title>
    <style>
        body { font-family: sans-serif; background: #1a0b2e; color: white; padding: 20px; }
        .chat { margin-top: 20px; border-top: 1px solid #b77bff; padding-top: 10px; }
        .message { padding: 8px; margin: 5px 0; border-radius: 12px; max-width: 70%; }
        .own { background: #00ffaa; color: #1a0b2e; align-self: flex-end; margin-left: auto; }
        .other { background: #2a1a3e; }
        .messages { display: flex; flex-direction: column; height: 300px; overflow-y: auto; margin-bottom: 10px; background: #0e0518; padding: 10px; border-radius: 16px; }
        input, button { padding: 8px; margin: 5px; }
        button { background: #b77bff; border: none; border-radius: 20px; cursor: pointer; }
        .online { color: #00ffaa; font-size: 12px; }
    </style>
</head>
<body>
    <div id="auth">
        <h2>Вход / Регистрация</h2>
        <input id="login" placeholder="username"><br>
        <input id="pass" type="password" placeholder="пароль"><br>
        <button id="doLogin">Войти</button>
        <button id="doRegister">Регистрация</button>
    </div>

    <div id="app" style="display:none">
        <div><b id="myName"></b> <span id="status" class="online"></span></div>
        <div>
            <input id="search" placeholder="Поиск пользователя...">
            <div id="usersList" style="border:1px solid #b77bff; margin:10px 0; padding:5px; max-height:150px; overflow-y:auto"></div>
        </div>
        <div class="chat">
            <div id="chatWith"></div>
            <div class="messages" id="messages"></div>
            <input id="messageInput" placeholder="Сообщение...">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentChatId, currentChatName;
        let token = localStorage.getItem('token');

        const authDiv = document.getElementById('auth');
        const appDiv = document.getElementById('app');
        const myNameSpan = document.getElementById('myName');
        const messagesDiv = document.getElementById('messages');
        const searchInput = document.getElementById('search');
        const usersListDiv = document.getElementById('usersList');
        const chatWithSpan = document.getElementById('chatWith');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        async function request(url, data) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        document.getElementById('doRegister').onclick = async () => {
            const u = document.getElementById('login').value.trim();
            const p = document.getElementById('pass').value;
            if (!u || !p) return;
            const res = await request('/api/register', { username: u, password: p, displayName: u });
            if (res.token) {
                token = res.token;
                localStorage.setItem('token', token);
                start();
            } else alert('Ошибка рег');
        };

        document.getElementById('doLogin').onclick = async () => {
            const u = document.getElementById('login').value.trim();
            const p = document.getElementById('pass').value;
            if (!u || !p) return;
            const res = await request('/api/login', { username: u, password: p });
            if (res.token) {
                token = res.token;
                localStorage.setItem('token', token);
                start();
            } else alert('Ошибка входа');
        };

        function start() {
            authDiv.style.display = 'none';
            appDiv.style.display = 'block';
            connectSocket();
        }

        function connectSocket() {
            socket = io({ auth: { token } });
            socket.on('connect', () => console.log('socket connected'));
            socket.on('init', (data) => {
                currentUser = data.user;
                myNameSpan.innerText = currentUser.displayName || currentUser.username;
                document.getElementById('status').innerText = 'онлайн';
            });

            socket.on('new_message', (msg) => {
                console.log('📨 ПОЛУЧЕНО СООБЩЕНИЕ:', msg);
                if (currentChatId === msg.to || currentChatId === msg.from || msg.to === currentChatId || msg.from === currentChatId) {
                    addMessage(msg);
                } else {
                    console.log('⚠️ не в активный чат, но сообщение есть');
                    // обновим список чатов/пользователей
                    loadUsers();
                }
            });

            socket.on('chat_history', (data) => {
                messagesDiv.innerHTML = '';
                (data.messages || []).forEach(m => addMessage(m));
            });

            socket.on('user_status', (u) => {
                if (currentChatName === '@'+u.username) {
                    document.getElementById('status').innerHTML = u.online ? '🟢 онлайн' : `⚫ был ${u.lastSeenFormatted}`;
                }
            });
        }

        function addMessage(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.from === currentUser.username ? 'own' : 'other'}`;
            div.innerHTML = `<b>${msg.from}</b> ${msg.text}<br><small>${new Date(msg.timestamp).toLocaleTimeString()}</small>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function loadUsers() {
            const q = searchInput.value.trim();
            if (!q) return;
            const res = await fetch(`/api/search?q=${q}`);
            const users = await res.json();
            usersListDiv.innerHTML = '';
            users.forEach(u => {
                const btn = document.createElement('button');
                btn.innerText = `${u.displayName} (@${u.username})`;
                btn.style.display = 'block';
                btn.onclick = () => {
                    currentChatName = '@'+u.username;
                    currentChatId = [currentUser.username, u.username].sort().join('_');
                    chatWithSpan.innerText = `Чат с ${u.displayName}`;
                    socket.emit('load_chat', { chatId: currentChatId });
                    socket.emit('get_user_status', { username: u.username });
                };
                usersListDiv.appendChild(btn);
            });
        }

        searchInput.addEventListener('input', loadUsers);

        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (!text || !currentChatId) return;
            console.log('📤 отправляем', { to: currentChatId, text });
            socket.emit('send_message', {
                to: currentChatId,
                type: 'dm',
                text: text,
                attachments: []
            });
            messageInput.value = '';
        };

        if (token) start();
    </script>
</body>
</html>
