<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a0b2e">
    <title>Potatuika Messenger 💜💚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes messageAppear { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--bg-dark), var(--bg-light)); color: var(--text); height: 100vh; overflow: hidden; }
        body.theme-purple-green { --primary: #b77bff; --primary-dark: #9a5fd9; --secondary: #00ffaa; --secondary-dark: #00cc88; --bg-dark: #1a0b2e; --bg-light: #2a1a3e; --bg-card: rgba(26, 11, 46, 0.95); --text: #ffffff; --text-secondary: rgba(255,255,255,0.7); --text-muted: rgba(255,255,255,0.5); --hover: rgba(183,123,255,0.2); --border: rgba(183,123,255,0.2); }
        body.theme-dark { --primary: #6c5ce7; --primary-dark: #5b4bc4; --secondary: #a8e6cf; --secondary-dark: #8bcdb5; --bg-dark: #1e1e1e; --bg-light: #2d2d2d; --bg-card: rgba(30,30,30,0.95); --text: #ffffff; --text-secondary: rgba(255,255,255,0.7); --text-muted: rgba(255,255,255,0.5); --hover: rgba(108,92,231,0.2); --border: rgba(108,92,231,0.2); }

        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        .auth-container { max-width: 400px; margin: 15vh auto; background: var(--bg-card); border-radius: 28px; padding: 32px 24px; backdrop-filter: blur(20px); border: 1px solid var(--border); animation: fadeIn 0.5s ease; }
        @media (max-width: 480px) { .auth-container { margin: 10vh 16px; padding: 24px 20px; } }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 56px; animation: pulse 2s infinite; }
        .logo h1 { font-size: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-top: 8px; }
        .auth-tabs { display: flex; gap: 12px; margin-bottom: 24px; }
        .tab-btn { flex: 1; padding: 12px; background: rgba(183,123,255,0.1); border: none; color: var(--text); cursor: pointer; border-radius: 60px; font-size: 16px; font-weight: 500; transition: all 0.2s ease; }
        .tab-btn:active { transform: scale(0.97); }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--bg-dark); }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form input { width: 100%; padding: 16px; margin-bottom: 16px; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 60px; color: var(--text); font-size: 16px; transition: all 0.2s ease; }
        .auth-form input:focus { outline: none; border-color: var(--secondary); background: rgba(255,255,255,0.12); }
        .auth-form button { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 60px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s ease; }
        .auth-form button:active { transform: scale(0.97); }
        .loading-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, var(--bg-dark), var(--bg-light)); }
        .loading-spinner { text-align: center; }
        .loading { display: inline-block; width: 50px; height: 50px; border: 3px solid var(--primary); border-top-color: var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; }

        .app-container { display: flex; height: 100vh; position: relative; }
        .sidebar { width: 320px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; backdrop-filter: blur(20px); z-index: 10; }
        @media (max-width: 768px) { .sidebar { position: fixed; left: -320px; top: 0; height: 100%; transition: left 0.3s ease; z-index: 100; } .sidebar.open { left: 0; } .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; } .sidebar-overlay.open { display: block; } }
        .user-info { padding: 20px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s ease; }
        .user-info:active { background: var(--hover); }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; flex-shrink: 0; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .user-details { flex: 1; min-width: 0; }
        .user-details h3 { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-details p { font-size: 13px; color: var(--secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-box { padding: 12px 16px; }
        .search-box input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 60px; color: var(--text); font-size: 15px; transition: all 0.2s ease; }
        .search-box input:focus { outline: none; border-color: var(--secondary); background: rgba(255,255,255,0.12); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 14px 16px; cursor: pointer; transition: background 0.2s ease; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .chat-item:active { background: var(--hover); }
        .chat-item.active { background: linear-gradient(90deg, var(--hover), transparent); border-left: 3px solid var(--secondary); }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        .chat-header { padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .menu-btn { display: none; background: none; border: none; font-size: 24px; cursor: pointer; padding: 8px; color: var(--text); }
        @media (max-width: 768px) { .menu-btn { display: block; } }
        .chat-header-info { flex: 1; }
        .chat-header h2 { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-status-text { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .chat-actions { display: flex; gap: 8px; }
        .chat-actions button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; transition: background 0.2s ease; color: var(--text); }
        .chat-actions button:active { background: var(--hover); }

        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 20px; animation: messageAppear 0.2s ease; position: relative; }
        @media (max-width: 480px) { .message { max-width: 85%; } }
        .message.own { align-self: flex-end; background: linear-gradient(135deg, var(--secondary), var(--secondary-dark)); color: var(--bg-dark); border-bottom-right-radius: 4px; }
        .message.other { align-self: flex-start; background: var(--bg-card); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 12px; font-weight: 600; margin-bottom: 4px; opacity: 0.8; }
        .message-text { font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .message-edited { font-size: 9px; opacity: 0.5; margin-left: 4px; }
        .message-reply { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 6px 10px; margin-bottom: 6px; font-size: 12px; border-left: 3px solid var(--secondary); cursor: pointer; }
        .pinned-message { background: rgba(0,255,170,0.1); border-left: 3px solid var(--secondary); }
        .message-image, .message-video { max-width: 100%; max-height: 250px; border-radius: 16px; margin-top: 8px; cursor: pointer; }
        .message-audio { width: 100%; margin-top: 8px; }
        .typing-indicator { padding: 8px 16px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
