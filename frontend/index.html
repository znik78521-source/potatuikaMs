<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potatuika Messenger 💜💚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2a1a3e 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Страницы */
        .page {
            display: none;
            width: 100%;
            height: 100%;
        }

        .page.active {
            display: block;
        }

        /* АВТОРИЗАЦИЯ */
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(30, 16, 41, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(183, 123, 255, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
        }

        .logo h1 {
            color: #b77bff;
            font-size: 32px;
            margin-top: 10px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(183, 123, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #b77bff, #00ffaa);
            color: #1a0b2e;
            font-weight: bold;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(183, 123, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #00ffaa;
        }

        .auth-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none;
            border-radius: 10px;
            color: #1a0b2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 170, 0.3);
        }

        .demo-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 20px;
        }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            background: rgba(26, 11, 46, 0.95);
            border-right: 1px solid rgba(183, 123, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(183, 123, 255, 0.2);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b77bff, #00ffaa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #1a0b2e;
        }

        .user-details {
            flex: 1;
        }

        .user-details h3 {
            color: #fff;
            font-size: 16px;
        }

        .user-details p {
            color: #00ffaa;
            font-size: 12px;
        }

        .search-box {
            padding: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(183, 123, 255, 0.3);
            border-radius: 10px;
            color: #fff;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid rgba(183, 123, 255, 0.1);
        }

        .chat-item:hover {
            background: rgba(183, 123, 255, 0.1);
        }

        .chat-item.active {
            background: linear-gradient(90deg, rgba(183, 123, 255, 0.2), transparent);
            border-left: 3px solid #00ffaa;
        }

        .chat-name {
            color: #fff;
            font-weight: bold;
        }

        .chat-preview {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 5px;
        }

        .online-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ffaa;
            margin-right: 8px;
        }

        /* Чат */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(30, 16, 41, 0.8);
        }

        .chat-header {
            padding: 20px;
            background: rgba(26, 11, 46, 0.95);
            border-bottom: 1px solid rgba(183, 123, 255, 0.2);
        }

        .chat-header h2 {
            color: #b77bff;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #00ffaa, #00cc88);
            color: #1a0b2e;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(183, 123, 255, 0.2);
            color: #fff;
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .message-text {
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .message-image, .message-video {
            max-width: 300px;
            border-radius: 10px;
            margin-top: 5px;
        }

        /* Ввод сообщения */
        .message-input-area {
            padding: 20px;
            background: rgba(26, 11, 46, 0.95);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(183, 123, 255, 0.2);
        }

        .message-input-area input {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(183, 123, 255, 0.3);
            border-radius: 25px;
            color: #fff;
        }

        .message-input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none;
            border-radius: 25px;
            color: #1a0b2e;
            font-weight: bold;
            cursor: pointer;
        }

        .file-btn {
            background: rgba(183, 123, 255, 0.3) !important;
        }

        /* Каналы */
        .channels-panel {
            position: fixed;
            right: 20px;
            bottom: 80px;
        }

        .create-channel-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 170, 0.3);
        }
    </style>
</head>
<body>
    <div id="login-page" class="page active">
        <div class="auth-container">
            <div class="logo">
                <div class="logo-icon">💜💚</div>
                <h1>Potatuika</h1>
            </div>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="@username">
                <input type="password" id="login-password" placeholder="Пароль">
                <button id="login-btn">Войти</button>
                <p class="demo-hint">🍟 Тестовые: alex / 123  или  maria / 123</p>
            </div>
            <div id="register-form" class="auth-form">
                <input type="text" id="reg-username" placeholder="@username">
                <input type="text" id="reg-displayname" placeholder="Ваше имя">
                <input type="password" id="reg-password" placeholder="Пароль">
                <button id="register-btn">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <div id="app-page" class="page">
        <div class="app-container">
            <div class="sidebar">
                <div class="user-info" id="user-info">
                    <div class="avatar" id="user-avatar">👤</div>
                    <div class="user-details">
                        <h3 id="user-displayname"></h3>
                        <p id="user-username"></p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Поиск по @username">
                </div>
                <div class="chats-list" id="chats-list"></div>
            </div>
            <div class="chat-area" id="chat-area" style="display: none;">
                <div class="chat-header">
                    <h2 id="chat-title"></h2>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <button class="file-btn" id="file-btn">📎</button>
                    <input type="text" id="message-input" placeholder="Введите сообщение...">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentChat = null;
        let token = null;

        // Переключение табов
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(`${tab}-form`).classList.add('active');
            });
        });

        // Регистрация
        document.getElementById('register-btn').addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value;
            const displayName = document.getElementById('reg-displayname').value;
            const password = document.getElementById('reg-password').value;
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, displayName })
            });
            
            if (res.ok) {
                const data = await res.json();
                alert('Регистрация успешна! Теперь войдите');
                document.querySelector('[data-tab="login"]').click();
            } else {
                const err = await res.json();
                alert('Ошибка: ' + err.error);
            }
        });

        // Логин
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                currentUser = data.user;
                connectSocket();
            } else {
                alert('Неверный логин или пароль');
            }
        });

        function connectSocket() {
            socket = io({
                auth: { token }
            });
            
            socket.on('connect', () => {
                console.log('Подключено к серверу');
            });
            
            socket.on('init', (data) => {
                currentUser = data.user;
                document.getElementById('user-displayname').textContent = currentUser.displayName;
                document.getElementById('user-username').textContent = '@' + currentUser.username;
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('app-page').classList.add('active');
                
                renderChats(data.chats);
            });
            
            socket.on('new_message', (message) => {
                if (currentChat && 
                    ((message.type === 'dm' && (message.from === currentChat.id || message.to === currentChat.id)) ||
                     (message.type === 'channel' && message.to === currentChat.id))) {
                    addMessageToChat(message);
                }
                refreshChats();
            });
            
            socket.on('chat_history', (data) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                data.messages.forEach(msg => addMessageToChat(msg));
            });
            
            socket.on('user_online', ({ username }) => {
                refreshChats();
            });
            
            socket.on('user_offline', ({ username }) => {
                refreshChats();
            });
        }
        
        function renderChats(chats) {
            const container = document.getElementById('chats-list');
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.onclick = () => loadChat(chat);
                div.innerHTML = `
                    <div class="chat-name">
                        ${chat.type === 'dm' ? '👤 ' + chat.displayName : '📢 ' + chat.name}
                    </div>
                    <div class="chat-preview">
                        ${chat.lastMessage ? chat.lastMessage.text : 'Новый чат'}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function loadChat(chat) {
            currentChat = chat;
            document.getElementById('chat-title').textContent = chat.type === 'dm' ? chat.displayName : chat.name;
            document.getElementById('chat-area').style.display = 'flex';
            socket.emit('load_chat', { with: chat.id, type: chat.type });
        }
        
        function addMessageToChat(message) {
            const container = document.getElementById('messages-container');
            const isOwn = message.from === currentUser.username;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            let content = '';
            if (!isOwn && message.type === 'dm') {
                content += `<div class="message-sender">${message.from}</div>`;
            }
            content += `<div class="message-text">${message.text}</div>`;
            
            if (message.attachments) {
                message.attachments.forEach(att => {
                    if (att.type === 'image') {
                        content += `<img src="${att.url}" class="message-image">`;
                    } else if (att.type === 'video') {
                        content += `<video src="${att.url}" controls class="message-video"></video>`;
                    } else {
                        content += `<a href="${att.url}" target="_blank">📎 ${att.name}</a>`;
                    }
                });
            }
            
            content += `<div class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</div>`;
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function refreshChats() {
            // Просто перезагружаем чаты через init
            socket.emit('load_chat', { with: currentChat?.id, type: currentChat?.type });
        }
        
        // Отправка сообщения
        document.getElementById('send-btn')?.addEventListener('click', () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text && currentChat) {
                socket.emit('send_message', {
                    to: currentChat.id,
                    type: currentChat.type,
                    text,
                    attachments: []
                });
                input.value = '';
            }
        });
        
        document.getElementById('message-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('send-btn').click();
            }
        });
        
        // Загрузка файлов
        document.getElementById('file-btn')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                socket.emit('send_message', {
                    to: currentChat.id,
                    type: currentChat.type,
                    text: `Отправил(а) файл: ${data.name}`,
                    attachments: [data]
                });
            };
            input.click();
        });
        
        // Поиск
        document.getElementById('search-input')?.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length > 1) {
                const res = await fetch(`/api/search?q=${query}`);
                const users = await res.json();
                // Показываем результаты поиска в чатах
                const container = document.getElementById('chats-list');
                container.innerHTML = '';
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => {
                        loadChat({ id: user.username, type: 'dm', displayName: user.displayName });
                    };
                    div.innerHTML = `
                        <div class="chat-name">👤 ${user.displayName}</div>
                        <div class="chat-preview">@${user.username}</div>
                    `;
                    container.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
