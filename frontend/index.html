<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Potatuika Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0b2e, #2a1a3e);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: block; }
        .auth-container {
            max-width: 400px; margin: 15vh auto; background: rgba(26,11,46,0.95);
            border-radius: 28px; padding: 32px; backdrop-filter: blur(20px);
            border: 1px solid rgba(183,123,255,0.3);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 56px; }
        .logo h1 { font-size: 32px; background: linear-gradient(135deg, #b77bff, #00ffaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-tabs { display: flex; gap: 12px; margin-bottom: 24px; }
        .tab-btn { flex: 1; padding: 12px; background: rgba(183,123,255,0.1); border: none; color: #fff; border-radius: 60px; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, #b77bff, #00ffaa); color: #1a0b2e; font-weight: bold; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form input {
            width: 100%; padding: 14px; margin-bottom: 16px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(183,123,255,0.3);
            border-radius: 60px; color: #fff; font-size: 16px;
        }
        .auth-form button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none; border-radius: 60px; font-weight: bold; cursor: pointer;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 320px; background: rgba(26,11,46,0.95); border-right: 1px solid rgba(183,123,255,0.2);
            display: flex; flex-direction: column;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -320px; transition: left 0.3s; z-index: 100; }
            .sidebar.open { left: 0; }
            .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
            .sidebar-overlay.open { display: block; }
        }
        .user-info { padding: 20px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar {
            width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #b77bff, #00ffaa);
            display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .user-details h3 { font-size: 16px; }
        .user-details p { font-size: 12px; color: #00ffaa; }
        .search-box { padding: 12px 16px; }
        .search-box input {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(183,123,255,0.3); border-radius: 60px; color: #fff;
        }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 14px 16px; cursor: pointer; border-bottom: 1px solid rgba(183,123,255,0.1);
            display: flex; align-items: center; gap: 12px;
        }
        .chat-item.active { background: linear-gradient(90deg, rgba(183,123,255,0.2), transparent); border-left: 3px solid #00ffaa; }
        .chat-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #b77bff, #00ffaa);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; }
        .chat-preview { font-size: 12px; color: rgba(255,255,255,0.6); }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #1a0b2e; }
        .chat-header {
            padding: 12px 16px; background: rgba(26,11,46,0.95); border-bottom: 1px solid rgba(183,123,255,0.2);
            display: flex; align-items: center; gap: 12px;
        }
        .menu-btn { display: none; background: none; border: none; font-size: 24px; color: #fff; cursor: pointer; }
        @media (max-width: 768px) { .menu-btn { display: block; } }
        .chat-header-info { flex: 1; }
        .chat-header h2 { font-size: 17px; }
        .chat-status-text { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .chat-actions { display: flex; gap: 8px; }
        .chat-actions button { background: none; border: none; font-size: 20px; color: #fff; cursor: pointer; padding: 8px; border-radius: 50%; }
        .messages-container {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
        }
        .message {
            max-width: 75%; padding: 10px 14px; border-radius: 20px;
        }
        .message.own {
            align-self: flex-end; background: linear-gradient(135deg, #00ffaa, #00cc88);
            color: #1a0b2e; border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start; background: rgba(183,123,255,0.2); border-bottom-left-radius: 4px;
        }
        .message-sender { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .message-text { font-size: 14px; }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .message-image, .message-video { max-width: 250px; border-radius: 16px; margin-top: 8px; cursor: pointer; }
        .message-audio { width: 200px; margin-top: 8px; }
        .typing-indicator { padding: 8px 16px; font-size: 12px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 4px; }
        .message-input-area {
            padding: 12px 16px; background: rgba(26,11,46,0.95); display: flex; gap: 10px;
            border-top: 1px solid rgba(183,123,255,0.2);
        }
        .message-input-area input {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(183,123,255,0.3); border-radius: 60px; color: #fff;
        }
        .message-input-area button {
            width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none; font-size: 20px; cursor: pointer;
        }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #2a1a3e; border-radius: 28px; padding: 24px;
            max-width: 90%; width: 400px; max-height: 80vh; overflow-y: auto;
        }
        .modal-content h3 { color: #b77bff; margin-bottom: 20px; }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%; padding: 12px; margin-bottom: 16px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(183,123,255,0.3);
            border-radius: 16px; color: #fff;
        }
        .modal-content button {
            padding: 10px 20px; background: linear-gradient(135deg, #b77bff, #00ffaa);
            border: none; border-radius: 60px; cursor: pointer; margin-right: 10px;
        }
        .media-viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center; z-index: 1100;
        }
        .media-viewer.active { display: flex; }
        .media-viewer img, .media-viewer video { max-width: 90%; max-height: 90%; border-radius: 20px; }
        .close-media {
            position: absolute; top: 20px; right: 20px; font-size: 40px; cursor: pointer;
            background: rgba(0,0,0,0.5); width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .loading { display: inline-block; width: 50px; height: 50px; border: 3px solid #b77bff; border-top-color: #00ffaa; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="login-page" class="page active"></div>
    <div id="app-page" class="page">
        <div class="app-container">
            <div class="sidebar-overlay" id="sidebar-overlay"></div>
            <div class="sidebar" id="sidebar">
                <div class="user-info" id="user-info">
                    <div class="avatar" id="user-avatar">👤</div>
                    <div class="user-details">
                        <h3 id="user-displayname"></h3>
                        <p id="user-username"></p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Поиск пользователей...">
                </div>
                <div class="chats-list" id="chats-list"></div>
            </div>
            <div class="chat-area" id="chat-area" style="display: none;">
                <div class="chat-header">
                    <button class="menu-btn" id="menu-btn">☰</button>
                    <div class="chat-header-info">
                        <h2 id="chat-title"></h2>
                        <div class="chat-status-text" id="chat-status-text"></div>
                    </div>
                    <div class="chat-actions">
                        <button id="settings-btn">⚙️</button>
                        <button id="create-group-btn">👥</button>
                        <button id="create-channel-btn">📢</button>
                    </div>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <button id="file-btn">📎</button>
                    <input type="text" id="message-input" placeholder="Сообщение...">
                    <button id="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>✏️ Редактировать профиль</h3>
            <input type="text" id="profile-displayname" placeholder="Отображаемое имя">
            <textarea id="profile-bio" rows="3" placeholder="О себе"></textarea>
            <button id="upload-avatar-btn">📸 Загрузить аватар</button>
            <input type="file" id="avatar-input" accept="image/*" style="display: none;">
            <br><br>
            <button id="save-profile">💾 Сохранить</button>
            <button onclick="closeModal('profile-modal')">❌ Отмена</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>⚙️ Настройки</h3>
            <select id="theme-select">
                <option value="purple-green">💜 Фиолетово-зеленая</option>
                <option value="dark">🌙 Темная</option>
            </select>
            <br><br>
            <button onclick="saveSettings()">💾 Сохранить</button>
            <button onclick="closeModal('settings-modal')">❌ Закрыть</button>
        </div>
    </div>

    <div id="group-modal" class="modal">
        <div class="modal-content">
            <h3>👥 Создать группу</h3>
            <input type="text" id="group-name" placeholder="Название группы">
            <textarea id="group-desc" placeholder="Описание"></textarea>
            <button id="create-group-submit">✨ Создать</button>
            <button onclick="closeModal('group-modal')">❌ Отмена</button>
        </div>
    </div>

    <div id="channel-modal" class="modal">
        <div class="modal-content">
            <h3>📢 Создать канал</h3>
            <input type="text" id="channel-name" placeholder="Название канала">
            <textarea id="channel-desc" placeholder="Описание"></textarea>
            <button id="create-channel-submit">✨ Создать</button>
            <button onclick="closeModal('channel-modal')">❌ Отмена</button>
        </div>
    </div>

    <div id="media-viewer" class="media-viewer">
        <span class="close-media" onclick="closeMedia()">×</span>
        <img id="media-img" style="display: none;">
        <video id="media-video" controls style="display: none;"></video>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentChat = null;
        let token = localStorage.getItem('potatuika_token');

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeMedia() {
            document.getElementById('media-viewer').classList.remove('active');
            document.getElementById('media-img').style.display = 'none';
            document.getElementById('media-video').style.display = 'none';
            document.getElementById('media-video').pause();
        }
        function viewMedia(url, type) {
            const viewer = document.getElementById('media-viewer');
            const img = document.getElementById('media-img');
            const video = document.getElementById('media-video');
            img.style.display = 'none';
            video.style.display = 'none';
            if (type === 'image') { img.src = url; img.style.display = 'block'; }
            else if (type === 'video') { video.src = url; video.style.display = 'block'; video.play(); }
            viewer.classList.add('active');
        }
        function saveSettings() {
            const theme = document.getElementById('theme-select').value;
            document.body.className = `theme-${theme}`;
            if (currentUser) {
                fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, theme })
                });
            }
            closeModal('settings-modal');
        }
        function cleanUsername(name) {
            if (!name) return '';
            while (name.startsWith('@')) name = name.substring(1);
            return name;
        }
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function formatStatus(online, lastSeen) {
            if (online) return '<span style="color: #00ffaa;">🟢 в сети</span>';
            else if (lastSeen) {
                const diff = Date.now() - lastSeen;
                const mins = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                if (mins < 1) return '<span style="color: #888;">🟤 только что</span>';
                if (mins < 60) return `<span style="color: #888;">🟤 ${mins} мин назад</span>`;
                if (hours < 24) return `<span style="color: #888;">🟤 ${hours} ч назад</span>`;
                return `<span style="color: #888;">🟤 ${days} д назад</span>`;
            }
            return '<span style="color: #888;">⚫ не в сети</span>';
        }
        function showLoginForm() {
            const loginPage = document.getElementById('login-page');
            loginPage.innerHTML = `
                <div class="auth-container">
                    <div class="logo"><div class="logo-icon">💜💚</div><h1>Potatuika</h1></div>
                    <div class="auth-tabs"><button class="tab-btn active" data-tab="login">Вход</button><button class="tab-btn" data-tab="register">Регистрация</button></div>
                    <div id="login-form" class="auth-form active"><input type="text" id="login-username" placeholder="username"><input type="password" id="login-password" placeholder="Пароль"><button id="login-btn">Войти</button></div>
                    <div id="register-form" class="auth-form"><input type="text" id="reg-username" placeholder="username"><input type="text" id="reg-displayname" placeholder="Имя"><input type="password" id="reg-password" placeholder="Пароль"><button id="register-btn">Создать</button></div>
                </div>
            `;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                    document.getElementById(`${tab}-form`).classList.add('active');
                });
            });
            document.getElementById('register-btn')?.addEventListener('click', async () => {
                let u = document.getElementById('reg-username').value;
                const d = document.getElementById('reg-displayname').value;
                const p = document.getElementById('reg-password').value;
                u = cleanUsername(u);
                const res = await fetch('/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, displayName: d })
                });
                if (res.ok) { const data = await res.json(); currentUser = data.user; token = data.token; localStorage.setItem('potatuika_token', token); connectSocket(); }
                else { const err = await res.json(); alert('❌ ' + err.error); }
            });
            document.getElementById('login-btn')?.addEventListener('click', async () => {
                let u = document.getElementById('login-username').value;
                const p = document.getElementById('login-password').value;
                u = cleanUsername(u);
                const res = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                if (res.ok) { const data = await res.json(); currentUser = data.user; token = data.token; localStorage.setItem('potatuika_token', token); connectSocket(); }
                else alert('❌ Неверный логин');
            });
        }
        function showLoading() {
            document.getElementById('login-page').innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:100vh;"><div class="loading"></div></div>`;
            document.getElementById('login-page').classList.add('active');
        }
        function connectSocket() {
            socket = io({ auth: { token } });
            socket.on('connect', () => console.log('✅ Подключено'));
            socket.on('init', (data) => {
                currentUser = data.user;
                document.getElementById('user-displayname').textContent = currentUser.displayName;
                document.getElementById('user-username').textContent = '@' + currentUser.username;
                if (currentUser.avatar) document.getElementById('user-avatar').innerHTML = `<img src="${currentUser.avatar}" class="avatar-img">`;
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('app-page').classList.add('active');
                renderChats(data.chats);
            });
            socket.on('new_message', (msg) => {
                if (currentChat && (msg.to === currentChat.id || msg.from === currentChat.id)) addMessageToChat(msg);
                refreshChatsList();
            });
            socket.on('chat_history', (data) => {
                const c = document.getElementById('messages-container');
                c.innerHTML = '';
                data.messages.forEach(m => addMessageToChat(m));
                c.scrollTop = c.scrollHeight;
            });
            socket.on('user_status_change', (d) => {
                if (currentChat?.type === 'dm' && currentChat.id.includes(d.username)) document.getElementById('chat-status-text').innerHTML = formatStatus(d.online, d.lastSeen);
                refreshChatsList();
            });
            socket.on('user_status', (d) => {
                if (currentChat?.type === 'dm' && currentChat.id.includes(d.username)) document.getElementById('chat-status-text').innerHTML = formatStatus(d.online, d.lastSeen);
            });
        }
        function renderChats(chats) {
            const c = document.getElementById('chats-list');
            c.innerHTML = '';
            if (!chats || chats.length === 0) { c.innerHTML = '<div style="padding:20px;text-align:center;color:gray;">📭 Нет чатов<br>🔍 Найдите пользователя</div>'; return; }
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                if (currentChat && currentChat.id === chat.id) div.classList.add('active');
                let name = '', icon = '👤', preview = chat.lastMessage ? (chat.lastMessage.text || '📎 Файл') : 'Новый чат';
                if (chat.type === 'dm') { name = '@' + chat.with; icon = '👤'; }
                else if (chat.type === 'group') { name = chat.name; icon = '👥'; }
                else if (chat.type === 'channel') { name = chat.name; icon = '📢'; }
                div.onclick = () => {
                    currentChat = { id: chat.id, type: chat.type, name: name };
                    document.getElementById('chat-title').textContent = name;
                    document.getElementById('chat-area').style.display = 'flex';
                    if (chat.type === 'dm') { socket.emit('get_user_status', { username: chat.with }); document.getElementById('chat-status-text').innerHTML = '<span style="color:rgba(255,255,255,0.6);">загрузка...</span>'; }
                    socket.emit('load_chat', { chatId: chat.id });
                    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                    if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
                };
                div.innerHTML = `<div class="chat-avatar">${icon}</div><div class="chat-info"><div class="chat-name">${escapeHtml(name)}</div><div class="chat-preview">${escapeHtml(preview.substring(0, 50))}</div></div>`;
                c.appendChild(div);
            });
        }
        function refreshChatsList() { socket.emit('get_chats'); }
        function addMessageToChat(msg) {
            const c = document.getElementById('messages-container');
            const isOwn = msg.from === currentUser.username;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            let content = '';
            if (!isOwn) content += `<div class="message-sender">${escapeHtml(msg.from)}</div>`;
            content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            if (msg.attachments?.length) {
                msg.attachments.forEach(att => {
                    if (att.type === 'image') content += `<img src="${att.url}" class="message-image" onclick="viewMedia('${att.url}','image')">`;
                    else if (att.type === 'video') content += `<video src="${att.url}" class="message-video" controls onclick="viewMedia('${att.url}','video')"></video>`;
                    else if (att.type === 'audio') content += `<audio src="${att.url}" class="message-audio" controls></audio>`;
                    else content += `<a href="${att.url}" target="_blank">📎 ${escapeHtml(att.name)}</a>`;
                });
            }
            content += `<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
            div.innerHTML = content;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }
        document.getElementById('send-btn')?.addEventListener('click', () => {
            const i = document.getElementById('message-input');
            const t = i.value.trim();
            if (t && currentChat) { socket.emit('send_message', { to: currentChat.id, type: currentChat.type, text: t, attachments: [] }); i.value = ''; }
        });
        document.getElementById('message-input')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });
        document.getElementById('file-btn')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*,audio/mpeg';
            input.onchange = async (e) => {
                const f = e.target.files[0];
                const fd = new FormData();
                fd.append('file', f);
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                socket.emit('send_message', { to: currentChat.id, type: currentChat.type, text: `📎 ${data.name}`, attachments: [data] });
            };
            input.click();
        });
        document.getElementById('user-info')?.addEventListener('click', () => {
            document.getElementById('profile-displayname').value = currentUser.displayName || '';
            document.getElementById('profile-bio').value = currentUser.bio || '';
            openModal('profile-modal');
        });
        document.getElementById('save-profile')?.addEventListener('click', async () => {
            const dn = document.getElementById('profile-displayname').value;
            const bio = document.getElementById('profile-bio').value;
            const res = await fetch('/api/update-profile', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, displayName: dn, bio })
            });
            const data = await res.json();
            if (data.success) { currentUser = data.user; document.getElementById('user-displayname').textContent = currentUser.displayName; alert('✅ Профиль обновлен'); closeModal('profile-modal'); }
        });
        document.getElementById('upload-avatar-btn')?.addEventListener('click', () => document.getElementById('avatar-input').click());
        document.getElementById('avatar-input')?.addEventListener('change', async (e) => {
            const f = e.target.files[0];
            const fd = new FormData(); fd.append('avatar', f);
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const data = await res.json();
            await fetch('/api/update-profile', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, avatar: data.url })
            });
            currentUser.avatar = data.url;
            document.getElementById('user-avatar').innerHTML = `<img src="${data.url}" class="avatar-img">`;
            alert('✅ Аватар обновлен'); closeModal('profile-modal');
        });
        document.getElementById('settings-btn')?.addEventListener('click', () => { document.getElementById('theme-select').value = currentUser?.theme || 'purple-green'; openModal('settings-modal'); });
        document.getElementById('create-group-btn')?.addEventListener('click', () => openModal('group-modal'));
        document.getElementById('create-channel-btn')?.addEventListener('click', () => openModal('channel-modal'));
        document.getElementById('create-group-submit')?.addEventListener('click', async () => {
            const name = document.getElementById('group-name').value;
            const desc = document.getElementById('group-desc').value;
            if (!name) { alert('Введите название'); return; }
            await fetch('/api/create-group', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, name, description: desc }) });
            alert('✅ Группа создана'); closeModal('group-modal'); location.reload();
        });
        document.getElementById('create-channel-submit')?.addEventListener('click', async () => {
            const name = document.getElementById('channel-name').value;
            const desc = document.getElementById('channel-desc').value;
            if (!name) { alert('Введите название'); return; }
            await fetch('/api/create-channel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, name, description: desc }) });
            alert('✅ Канал создан'); closeModal('channel-modal'); location.reload();
        });
        document.getElementById('search-input')?.addEventListener('input', async (e) => {
            let q = e.target.value;
            q = cleanUsername(q);
            if (q.length > 1) {
                const res = await fetch(`/api/search?q=${q}`);
                const users = await res.json();
                const c = document.getElementById('chats-list');
                c.innerHTML = '';
                if (!users.length) c.innerHTML = '<div style="padding:20px;text-align:center;color:gray;">👤 Не найдены</div>';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => {
                        const cid = [currentUser.username, u.username].sort().join('_');
                        currentChat = { id: cid, type: 'dm', name: '@' + u.username };
                        document.getElementById('chat-title').textContent = '@' + u.username;
                        document.getElementById('chat-area').style.display = 'flex';
                        socket.emit('load_chat', { chatId: cid });
                        socket.emit('get_user_status', { username: u.username });
                        if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
                    };
                    div.innerHTML = `<div class="chat-avatar">👤</div><div class="chat-info"><div class="chat-name">${escapeHtml(u.displayName)}</div><div class="chat-preview">@${u.username}</div></div>`;
                    c.appendChild(div);
                });
            } else if (q.length === 0) refreshChatsList();
        });
        document.getElementById('menu-btn')?.addEventListener('click', () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); });
        document.getElementById('sidebar-overlay')?.addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); });
        if (token) { showLoading(); fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) }).then(res=>res.json()).then(data=>{ if (data.user) { currentUser = data.user; token = data.token; localStorage.setItem('potatuika_token', token); connectSocket(); } else showLoginForm(); }).catch(()=>showLoginForm()); } else showLoginForm();
    </script>
</body>
</html>
