<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Potatuika Test (100%)</title>
    <style>
        body { background: #1a0b2e; color: white; font-family: system-ui; padding: 20px; }
        .flex { display: flex; gap: 20px; flex-wrap: wrap; }
        .chat { flex: 2; min-width: 300px; background: #0e0518; border-radius: 20px; padding: 16px; }
        .sidebar { flex: 1; min-width: 220px; background: #0e0518; border-radius: 20px; padding: 16px; }
        .messages { height: 400px; overflow-y: auto; border: 1px solid #b77bff; padding: 8px; margin: 10px 0; border-radius: 16px; }
        .msg { padding: 8px; margin: 6px 0; border-radius: 16px; max-width: 70%; }
        .my { background: #00ffaa; color: #000; margin-left: auto; text-align: right; }
        .other { background: #2a1a3e; }
        input, button { padding: 8px; margin: 4px; border-radius: 20px; border: none; }
        button { background: #b77bff; cursor: pointer; font-weight: bold; }
        .user-btn { background: #2a1a3e; margin: 4px 0; display: block; width: 100%; text-align: left; }
    </style>
</head>
<body>
    <h2>💜💚 POTATUIKA (чистый тест)</h2>
    <div id="auth">
        <input id="username" placeholder="Логин (без @)"> <br>
        <input id="password" type="password" placeholder="Пароль"> <br>
        <button id="loginBtn">Войти</button>
        <button id="registerBtn">Регистрация</button>
    </div>

    <div id="app" style="display: none;">
        <div class="flex">
            <div class="sidebar">
                <h3>👤 <span id="myName"></span> <span id="onlineStatus"></span></h3>
                <input id="searchInput" placeholder="🔍 Найти пользователя..." style="width: 100%;">
                <div id="searchResults" style="margin-top: 12px;"></div>
            </div>
            <div class="chat">
                <div id="chatHeader">📭 Выберите собеседника</div>
                <div class="messages" id="messages"></div>
                <div style="display: flex;">
                    <input id="msgInput" placeholder="Сообщение..." style="flex: 1;">
                    <button id="sendMsgBtn">➤ Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentChatId, currentChatUsername;
        let token = localStorage.getItem('token');
        const authDiv = document.getElementById('auth');
        const appDiv = document.getElementById('app');
        const myNameSpan = document.getElementById('myName');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const chatHeader = document.getElementById('chatHeader');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendMsgBtn');

        async function api(method, url, body) {
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return res.json();
        }

        document.getElementById('registerBtn').onclick = async () => {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if (!u || !p) return;
            const data = await api('POST', '/api/register', { username: u, password: p, displayName: u });
            if (data.token) {
                token = data.token;
                localStorage.setItem('token', token);
                start();
            } else alert('Ошибка регистрации');
        };

        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if (!u || !p) return;
            const data = await api('POST', '/api/login', { username: u, password: p });
            if (data.token) {
                token = data.token;
                localStorage.setItem('token', token);
                start();
            } else alert('Ошибка входа');
        };

        function start() {
            authDiv.style.display = 'none';
            appDiv.style.display = 'block';
            connectSocket();
        }

        function connectSocket() {
            if (socket) socket.disconnect();
            socket = io({ auth: { token } });

            socket.on('connect', () => console.log('✅ сокет подключен'));

            socket.on('init', (data) => {
                currentUser = data.user;
                myNameSpan.innerText = currentUser.displayName;
            });

            socket.on('new_message', (msg) => {
                console.log('🔥 НОВОЕ СООБЩЕНИЕ:', msg);
                if (currentChatId === msg.to || currentChatId === msg.from || msg.to === currentChatId || msg.from === currentChatId) {
                    appendMessage(msg);
                } else {
                    console.log('⚠️ сообщение в другой чат, но оно пришло:', msg.from);
                    // уведомление / подсветка
                }
            });

            socket.on('chat_history', (data) => {
                messagesDiv.innerHTML = '';
                (data.messages || []).forEach(m => appendMessage(m));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            socket.on('user_status', (data) => {
                if (currentChatUsername === data.username) {
                    const statusSpan = document.getElementById('onlineStatus');
                    if (statusSpan) statusSpan.innerText = data.online ? '🟢 онлайн' : `⚫ был(а) ${data.lastSeenFormatted}`;
                }
            });

            // автоматически грузим результаты поиска при изменении поля
            if (searchInput) searchInput.addEventListener('input', () => searchUsers(searchInput.value));
        }

        async function searchUsers(query) {
            if (!query) { searchResults.innerHTML = ''; return; }
            const users = await (await fetch(`/api/search?q=${query}`)).json();
            searchResults.innerHTML = '';
            users.forEach(u => {
                const btn = document.createElement('button');
                btn.innerText = `${u.displayName} (@${u.username})`;
                btn.className = 'user-btn';
                btn.onclick = () => openChat(u.username, u.displayName);
                searchResults.appendChild(btn);
            });
        }

        function openChat(username, displayName) {
            currentChatUsername = username;
            currentChatId = [currentUser.username, username].sort().join('_');
            chatHeader.innerText = `📩 Чат с ${displayName} (@${username})`;
            socket.emit('load_chat', { chatId: currentChatId });
            socket.emit('get_user_status', { username });
        }

        function appendMessage(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.from === currentUser.username ? 'my' : 'other'}`;
            div.innerHTML = `<b>${msg.from}</b> ${msg.text}<br><span style="font-size:10px;">${new Date(msg.timestamp).toLocaleTimeString()}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.onclick = () => {
            const text = msgInput.value.trim();
            if (!text || !currentChatId) return;
            socket.emit('send_message', {
                to: currentChatId,
                type: 'dm',
                text: text,
                attachments: []
            });
            msgInput.value = '';
        };

        if (token) start();
        else authDiv.style.display = 'block';
    </script>
</body>
</html>
